# Todo 전체 스택 — backend + frontend
# 생성: T-003 (MLOps agent)
# Frontend Q&A 기록: ALLOW_ORIGINS=http://localhost:5173 사전 합의
version: "3.9"

services:
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./todos.db
      - SECRET_KEY=${SECRET_KEY:-dev-only-change-in-production}
      - ALLOW_ORIGINS=http://localhost:5173
    volumes:
      - todo-data:/app/data
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend

volumes:
  todo-data:
